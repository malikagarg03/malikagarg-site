<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Entry Experiment</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    h1 {
      margin-bottom: 5px;
    }

    .subtitle {
      color: #64748b;
      margin-bottom: 20px;
    }

    .section {
      margin-bottom: 40px;
    }

    iframe {
      width: 100%;
      height: 600px;
      border: none;
      border-radius: 10px;
      background: white;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 12px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-left: 5px solid #2563eb;
    }

    .category {
      font-size: 12px;
      color: #0369a1;
      background: #e0f2fe;
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      margin-bottom: 6px;
    }

    .timestamp {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 8px;
    }

    .priority {
      font-size: 13px;
      color: #475569;
      margin-top: 6px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Simple Data Entry Experiment</h1>
  <p class="subtitle">Submit entries and view them live below.</p>

  <!-- FORM SECTION -->
  <div class="section">
    <h2>Submit Entry</h2>

    <iframe 
  src="https://docs.google.com/forms/d/e/1FAIpQLSds2FKDSAoN9cFJEPRGQF-5lRpotPSMEvbdhTyb8WhINSDpig/viewform?embedded=true" 
  width="100%" 
  height="1060" 
  frameborder="0" 
  marginheight="0" 
  marginwidth="0">
  Loading…
</iframe>
  </div>

  <!-- DATA SECTION -->
  <div class="section">
    <h2>Entries</h2>
    <div id="entries">Loading...</div>
  </div>

</div>

<script>
  const csvUrl = "https://docs.google.com/spreadsheets/d/1yH6B8V4krpZ3z8e70p884m9E4VTWnk-CY0n7FzdfQzA/gviz/tq?tqx=out:csv";

  function parseCSV(text) {
    const rows = [];
    let row = [];
    let cell = "";
    let insideQuotes = false;

    for (let i = 0; i < text.length; i++) {
      const char = text[i];
      const nextChar = text[i + 1];

      if (char === '"' && insideQuotes && nextChar === '"') {
        cell += '"';
        i++;
      } else if (char === '"') {
        insideQuotes = !insideQuotes;
      } else if (char === "," && !insideQuotes) {
        row.push(cell);
        cell = "";
      } else if ((char === "\n" || char === "\r") && !insideQuotes) {
        if (cell || row.length) {
          row.push(cell);
          rows.push(row);
          row = [];
          cell = "";
        }
      } else {
        cell += char;
      }
    }

    if (cell || row.length) {
      row.push(cell);
      rows.push(row);
    }

    return rows;
  }

  fetch(csvUrl)
    .then(res => res.text())
    .then(text => {
      const rows = parseCSV(text);

      if (rows.length <= 1) {
        document.getElementById("entries").innerHTML = "No entries yet.";
        return;
      }

      const data = rows.slice(1).reverse();

      document.getElementById("entries").innerHTML = data.map(row => {
        const timestamp = row[0] || "";
        const name = row[1] || "Anonymous";
        const category = row[2] || "";
        const message = row[3] || "";
        const priority = row[4] || "";

        return `
          <div class="card">
            <div class="category">${category}</div>
            <strong>${name}</strong>
            <p>${message}</p>
            <div class="priority">Priority: ${priority}</div>
            <div class="timestamp">${timestamp}</div>
          </div>
        `;
      }).join("");
    })
    .catch(() => {
      document.getElementById("entries").innerHTML =
        "Could not load data. Make sure your Google Sheet is published.";
    });
</script>

</body>
</html>
