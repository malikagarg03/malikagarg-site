<!DOCTYPE html>
<html>
<head>
  <title>Malika Garg</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #020617;
      color: #e2e8f0;
      font-family: monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .terminal {
      width: 90%;
      max-width: 700px;
    }

    .line {
      margin: 8px 0;
    }

    .prompt {
      color: #38bdf8;
    }

    input {
      background: none;
      border: none;
      color: white;
      font-family: monospace;
      font-size: 16px;
      width: 80%;
      outline: none;
    }

    .output {
      margin-top: 20px;
      color: #94a3b8;
    }

    .link {
      color: #a78bfa;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="terminal">
  <div class="line">
    <span class="prompt">></span> Welcome to malikagarg.xyz
  </div>

  <div class="line">
    <span class="prompt">></span> Type <span class="link">help</span> to begin
  </div>

  <div class="line">
    <span class="prompt">></span>
    <input id="command" autofocus placeholder="Enter command..." />
  </div>

  <div class="output" id="output"></div>
</div>

<script>
  const input = document.getElementById("command");
  const output = document.getElementById("output");

  input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      const cmd = input.value.trim().toLowerCase();
      handleCommand(cmd);
      input.value = "";
    }
  });

  function handleCommand(cmd) {
    if (cmd === "help") {
      output.innerHTML = `
        Available commands:<br>
        - diesel → Open Diesel Dashboard<br>
        - about → About this site<br>
        - clear → Clear screen
      `;
    }

    else if (cmd === "diesel") {
      window.location.href = "/rtgs-diesel-dashboard/";
    }

    else if (cmd === "about") {
      output.innerHTML = `
        This is a small space for tools, dashboards and experiments.
      `;
    }

    else if (cmd === "clear") {
      output.innerHTML = "";
    }

    else {
      output.innerHTML = "Command not found. Type 'help'.";
    }
  }
</script>

</body>
</html>
